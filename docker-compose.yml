services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shopnex-app:latest
    restart: unless-stopped
    env_file: .env
    ports:
      # Serve the app directly at http://localhost:3000 to match serverURL /
      # AUTH_URL / Google OAuth redirect. Caddy stays for HTTPS in production.
      - '3000:3000'
    volumes:
      - media:/app/public/media
    networks:
      - appnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    env_file: .env
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  media:
  caddy_data:
  caddy_config:
