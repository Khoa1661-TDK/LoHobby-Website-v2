services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Next.js inlines NEXT_PUBLIC_* at build time. These defaults mirror the
      # Dockerfile's ARG defaults, so `docker compose build` succeeds with no
      # host .env at all. A consumer's .env (loaded for variable substitution)
      # overrides them; because Next.js bakes them in, branding/domain changes
      # require a rebuild. Secrets are NOT listed here — they stay runtime-only
      # via env_file below.
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://example.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://example.com}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Shop}
        NEXT_PUBLIC_BRAND_TAGLINE: ${NEXT_PUBLIC_BRAND_TAGLINE:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
        NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-}
        NEXT_PUBLIC_CONTACT_ADDRESS: ${NEXT_PUBLIC_CONTACT_ADDRESS:-}
    image: shopnex-app:latest
    restart: unless-stopped
    # No local database service: DATABASE_URL points at the Prisma Data Proxy
    # (db.prisma.io), so the app connects straight to the hosted Postgres and
    # runs its migrations there. No healthcheck gate is needed.
    env_file: .env
    ports:
      # Serve the app directly at http://localhost:3000 to match serverURL /
      # AUTH_URL / Google OAuth redirect. Caddy stays for HTTPS in production.
      - '3000:3000'
    volumes:
      - media:/app/public/media
    networks:
      - appnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    env_file: .env
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  media:
  caddy_data:
  caddy_config:
