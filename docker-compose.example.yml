# =============================================================================
# TEMPLATE — copy to docker-compose.yml and fill in your real values.
# docker-compose.yml is GITIGNORED because it contains real secrets.
#
# Build + run: `docker compose build && docker compose up -d` — no .env, no args.
# Domain-changing vars are NOT baked: NEXT_PUBLIC_APP_URL / SITE_URL are omitted
# from build args so a single image works on any host (localhost, LAN IP, real
# domain). Set the runtime `APP_URL` below to change the domain with no rebuild.
# Never commit your filled-in docker-compose.yml; if it is ever committed, rotate
# EVERY secret in it.
#
# DEPLOY A PREBUILT IMAGE ON ANOTHER HOST (e.g. Portainer):
#   You do NOT need to rebuild per domain. Remove the `build:` block, point
#   `image:` at your published image, and set the RUNTIME `APP_URL` below to your
#   real https domain. `APP_URL` is read at start (not inlined), so it re-points
#   the admin panel, SEO/canonical URLs, and admin session cookies to your
#   domain with no rebuild. Also set AUTH_URL + DOMAIN and authorize the Google
#   redirect URI for that domain.
# =============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Only branding vars are baked (safe to generic). No NEXT_PUBLIC_APP_URL
      # or NEXT_PUBLIC_SITE_URL — those freeze the domain; use APP_URL at runtime.
      args:
        NEXT_PUBLIC_SITE_NAME: "Your Store"
        NEXT_PUBLIC_BRAND_TAGLINE: ""
        NEXT_PUBLIC_CONTACT_EMAIL: ""
        NEXT_PUBLIC_CONTACT_PHONE: ""
        NEXT_PUBLIC_CONTACT_ADDRESS: ""
    image: shopnex-app:latest
    restart: unless-stopped
    # Local database: the app talks to the bundled `db` service (Postgres in
    # this same compose project) and runs its migrations there on start. Wait
    # for the DB healthcheck so migrations don't race the DB.
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Runtime canonical URL — read by Node at start (NOT inlined like
      # NEXT_PUBLIC_*). Set to your real domain to re-point admin/SEO/
      # cookies on any host with no rebuild.
      APP_URL: "https://your-domain.example"
      DATABASE_URL: "postgres://shopnex:shopnex@db:5432/shopnex"
      PAYLOAD_SECRET: "CHANGE_ME"
      AUTH_SECRET: "CHANGE_ME"
      AUTH_URL: "https://your-domain.example/"
      AUTH_GOOGLE_ID: ""
      AUTH_GOOGLE_SECRET: ""
      NEXT_PUBLIC_SITE_NAME: "Your Store"
      NEXT_PUBLIC_BRAND_TAGLINE: ""
      NEXT_PUBLIC_CONTACT_EMAIL: ""
      NEXT_PUBLIC_CONTACT_PHONE: ""
      NEXT_PUBLIC_CONTACT_ADDRESS: ""
      PAYMENT_SECRETS_KEY: "CHANGE_ME"
      ADMIN_EMAILS: "you@example.com"
      PAYOS_CLIENT_ID: ""
      PAYOS_API_KEY: ""
      PAYOS_CHECKSUM_KEY: ""
      PREVIEW_SECRET: "CHANGE_ME"
      OPENROUTER_API_KEY: ""
      OPENROUTER_MODEL: "meta-llama/llama-3.3-70b-instruct:free"
    ports:
      - '3000:3000'
    volumes:
      - media:/app/public/media
    networks:
      - appnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Local Postgres — the store's primary database (Prisma + Payload share it).
  # Bound to the internal `appnet`; the app reaches it at `db:5432`. The host
  # port lets host-based dev (`pnpm dev` reading .env's localhost:5432) hit the
  # same DB. Never expose Postgres to the network.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopnex
      POSTGRES_PASSWORD: shopnex
      POSTGRES_DB: shopnex
    volumes:
      - shopnex_pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    networks:
      - appnet
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopnex -d shopnex']
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: "your-domain.example"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  media:
  caddy_data:
  caddy_config:
  shopnex_pgdata:
