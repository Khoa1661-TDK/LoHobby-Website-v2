# =============================================================================
# TEMPLATE — copy to docker-compose.yml and fill in your real values.
# docker-compose.yml is GITIGNORED because it contains real secrets.
#
# Build + run: `docker compose build && docker compose up -d` — no .env, no args.
# NEXT_PUBLIC_* are inlined by Next.js at BUILD time, so changing them needs a
# rebuild. Never commit your filled-in docker-compose.yml; if it is ever
# committed, rotate EVERY secret in it.
# =============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the client bundle at build time.
      args:
        NEXT_PUBLIC_APP_URL: "https://your-domain.example"
        NEXT_PUBLIC_SITE_URL: "https://your-domain.example"
        NEXT_PUBLIC_SITE_NAME: "Your Store"
        NEXT_PUBLIC_BRAND_TAGLINE: ""
        NEXT_PUBLIC_CONTACT_EMAIL: ""
        NEXT_PUBLIC_CONTACT_PHONE: ""
        NEXT_PUBLIC_CONTACT_ADDRESS: ""
    image: shopnex-app:latest
    restart: unless-stopped
    # No local database service: DATABASE_URL points at the Prisma Data Proxy
    # (db.prisma.io), so the app connects straight to the hosted Postgres and
    # runs its migrations there. No healthcheck gate is needed.
    environment:
      DATABASE_URL: "postgres://<token>:<key>@db.prisma.io:5432/postgres?sslmode=require"
      PAYLOAD_SECRET: "CHANGE_ME"
      AUTH_SECRET: "CHANGE_ME"
      AUTH_URL: "https://your-domain.example/"
      AUTH_GOOGLE_ID: ""
      AUTH_GOOGLE_SECRET: ""
      NEXT_PUBLIC_APP_URL: "https://your-domain.example"
      NEXT_PUBLIC_SITE_URL: "https://your-domain.example"
      DOMAIN: "your-domain.example"
      NEXT_PUBLIC_SITE_NAME: "Your Store"
      NEXT_PUBLIC_BRAND_TAGLINE: ""
      NEXT_PUBLIC_CONTACT_EMAIL: ""
      NEXT_PUBLIC_CONTACT_PHONE: ""
      NEXT_PUBLIC_CONTACT_ADDRESS: ""
      PAYMENT_SECRETS_KEY: "CHANGE_ME"
      ADMIN_EMAILS: "you@example.com"
      PAYOS_CLIENT_ID: ""
      PAYOS_API_KEY: ""
      PAYOS_CHECKSUM_KEY: ""
      PREVIEW_SECRET: "CHANGE_ME"
      OPENROUTER_API_KEY: ""
      OPENROUTER_MODEL: "meta-llama/llama-3.3-70b-instruct:free"
    ports:
      - '3000:3000'
    volumes:
      - media:/app/public/media
    networks:
      - appnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: "your-domain.example"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  media:
  caddy_data:
  caddy_config:
