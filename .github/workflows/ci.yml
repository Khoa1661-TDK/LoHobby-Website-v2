# Continuous integration — unit tests, typecheck, and production build
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_ci
  AUTH_SECRET: ci-test-auth-secret-minimum-32-characters
  PAYLOAD_SECRET: ci-test-payload-secret-minimum-32-chars
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm check-types

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm exec prisma migrate deploy

      - name: Apply Payload schema
        run: pnpm payload:db-push

      - name: Build application
        run: pnpm build
