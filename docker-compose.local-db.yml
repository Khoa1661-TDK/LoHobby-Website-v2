# Standalone local development Postgres for host-based dev (`pnpm dev`) when you
# are not running the full docker-compose.yml stack. Start with:
#   sudo docker compose -f docker-compose.local-db.yml up -d
# Then point .env DATABASE_URL at:
#   postgresql://shopnex:shopnex@localhost:5432/shopnex
services:
  db:
    image: postgres:16-alpine
    container_name: shopnex-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopnex
      POSTGRES_PASSWORD: shopnex
      POSTGRES_DB: shopnex
    ports:
      # Bind to localhost only — never expose the DB to the network.
      - "127.0.0.1:5432:5432"
    volumes:
      - shopnex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnex -d shopnex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shopnex_pgdata:
